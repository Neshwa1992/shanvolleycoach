<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Coach Gallery</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fancybox -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css" />
    <link rel="stylesheet" href="css/style.css" />
  
</head>

<body>

    <div class="container py-4">
        <h3 class="text-center mb-4">Coach Gallery</h3>

        <div class="row g-3" id="gallery"></div>
    </div>

    <!-- Fancybox -->
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.umd.js"></script>

    <script>
const gallery = document.getElementById("gallery");

// Generate 65 images automatically
for (let i = 1; i <= 64; i++) {
    gallery.innerHTML += `
        <div class="col-6 col-md-4 col-lg-3">
            <a href="images/coach${i}.jpeg" data-fancybox="gallery">
                <img src="images/coach${i}.jpeg" loading="lazy" class="img-fluid gallery-img">
            </a>
        </div>
    `;
}

// Activate Fancybox
Fancybox.bind("[data-fancybox='gallery']", {});
    </script>

</body>
</html>
