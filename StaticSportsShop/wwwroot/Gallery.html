<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Professional volleyball coaching inspired by FIVB standards. Improve your volleyball skills, tactics, fitness, and performance with expert coaching programs for players and teams.">

    <meta name="keywords" content="volleyball coaching,shanavas kidaran,shan,shan volleyball,shan volleyball coach,, volleyball training, volleyball coach, volleyball academy, volleyball skills, volleyball tactics,volleyball fitness, professional volleyball coaching, shan-volley coach,volleyball coaching uae,dubai volleyball best coaching">

    <meta name="author" content="Coaching Volleyball">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Coach Gallery</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fancybox -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css" />
    <link rel="stylesheet" href="css/style.css" />

</head>

<body>
    <div class="container mt-4">
        <a href="index.html" class="btn btn-primary">
            ← Back to Home
        </a>
    </div>
    <div class="container py-4">
        <h3 class="text-center mb-4">Coach Gallery</h3>

        <div class="row g-3" id="gallery"></div>
    </div>

    <!-- Fancybox -->
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.umd.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const gallery = document.getElementById("gallery");

            let html = "";

            // Generate images
            for (let i = 1; i <= 92; i++) {
                html += `
                    <div class="col-6 col-md-4 col-lg-3">
                        <a href="images/coach${i}.jpeg" data-fancybox="gallery">
                            <img
                                src="images/coach${i}.jpeg"
                                loading="lazy"
                                class="img-fluid gallery-img"
                                onerror="this.style.display='none'"
                            >
                        </a>
                    </div>
                `;
            }

            gallery.innerHTML = html;

            // Initialize Fancybox
            Fancybox.bind("[data-fancybox='gallery']", {});
        });
    </script>
</body>
</html>
